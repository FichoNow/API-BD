                  code: FICHAJE_NOT_FOUND
                  message: Fichaje no encontrado.

  /user/fichajes/{id}/breaks/{breakId}/end:
    patch:
      tags: ["User › Fichajes › Breaks"]
      summary: Terminar descanso
      description: |
        Registra la hora de fin de un descanso activo.

        **Formato de fechas**
        Todos los campos de fecha/hora deben enviarse en formato **ISO 8601 UTC**:
        `"YYYY-MM-DDTHH:mm:ss.sssZ"`

        **Reglas de negocio**
        - El fichaje debe pertenecer al usuario autenticado.
        - El descanso debe pertenecer al fichaje indicado.
        - `ended_at` debe ser posterior a `started_at`.
        - Si el fichaje tiene `clock_out`, `ended_at` no puede ser posterior a él.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del fichaje.
          schema:
            type: integer
            example: 42
        - name: breakId
          in: path
          required: true
          description: ID del descanso a cerrar.
          schema:
            type: integer
            example: 5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ended_at]
              properties:
                ended_at:
                  type: string
                  format: date-time
                  description: Hora de fin del descanso en formato ISO 8601 UTC.
                  example: "2026-03-29T12:30:00.000Z"
      responses:
        "200":
          description: Descanso cerrado correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NullResponse"
        "400":
          description: Body inválido, `ended_at` ausente o anterior a `started_at`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "404":
          description: Fichaje o descanso no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FICHAJE_BREAK_NOT_FOUND
                  message: Descanso no encontrado.

  # ─────────────────────────────────────────
  # CALENDAR
  # ─────────────────────────────────────────

  /user/calendar:
    get:
      tags: ["User › Calendar"]
      summary: Obtener calendario mensual
      description: |
        Devuelve el calendario del mes indicado para el usuario autenticado.
        Incluye un objeto por cada día del mes con su estado, horas planificadas
        y si es día laborable.

        **Reglas de negocio**
        - `year` debe ser un entero positivo.
        - `month` debe estar entre 1 y 12.
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          required: true
          description: Año del calendario a consultar.
          schema:
            type: integer
            example: 2026
        - name: month
          in: query
          required: true
          description: Mes del calendario a consultar (1–12).
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
      responses:
        "200":
          description: Calendario mensual del usuario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCalendarMonthResponse"
        "400":
          description: Año o mes inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Mes inválido.
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado

  # ─────────────────────────────────────────
  # USER › REQUESTS
  # ─────────────────────────────────────────

  /user/requests:
    get:
      tags: ["User › Requests"]
      summary: Obtener solicitudes de ausencia
      description: |
        Devuelve todas las solicitudes de ausencia del usuario autenticado,
        ordenadas por fecha de creación descendente.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de solicitudes del usuario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLeaveRequestsResponse"
              example:
                data:
                  - id: 12
                    type: VACATION
                    start_date: "2026-06-01"
                    end_date: "2026-06-15"
                    start_time: null
                    end_time: null
                    status: PENDING
                    comment: "Vacaciones de verano"
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado

    post:
      tags: ["User › Requests"]
      summary: Crear solicitud de ausencia
      description: |
        Crea una nueva solicitud de ausencia para el usuario autenticado.

        **Reglas de negocio**
        - `type` debe ser uno de: `VACATION`, `PERMISSION`, `SICK_LEAVE`, `MEDICAL_APPOINTMENT`, `DAY_OFF`.
        - `start_date` y `end_date` deben tener formato `YYYY-MM-DD`.
        - `start_time` y `end_time` deben venir **ambos informados** o **ambos vacíos/null**.
          Si se proporcionan, deben tener formato `HH:MM:SS`.
        - `comment` es opcional y no puede superar 255 caracteres.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostLeaveRequestBody"
            example:
              type: VACATION
              start_date: "2026-06-01"
              end_date: "2026-06-15"
              comment: "Vacaciones de verano"
      responses:
        "201":
          description: Solicitud creada correctamente. Devuelve el ID de la nueva solicitud.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostLeaveRequestResponse"
              example:
                data:
                  id: 12
        "400":
          description: Cuerpo de la petición inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido.
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado

  /user/requests/{id}:
    delete:
      tags: ["User › Requests"]
      summary: Cancelar solicitud de ausencia
      description: |
        Cancela una solicitud de ausencia del usuario autenticado.

        **Reglas de negocio**
        - El `id` debe ser un entero positivo.
        - Solo se pueden cancelar solicitudes en estado `PENDING`.
        - El usuario solo puede cancelar sus propias solicitudes.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la solicitud a cancelar.
          schema:
            type: integer
            example: 12
      responses:
        "200":
          description: Solicitud cancelada correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    nullable: true
                    example: null
        "400":
          description: ID inválido o la solicitud no está en estado PENDING.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: ID inválido.
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "403":
          description: La solicitud no pertenece al usuario autenticado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FORBIDDEN
                  message: No tienes permiso para cancelar esta solicitud.
        "404":
          description: Solicitud no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: NOT_FOUND
                  message: Solicitud no encontrada.

  # ─────────────────────────────────────────
  # SUPERADMIN
  # ─────────────────────────────────────────

  /superadmin/company:
    patch:
      tags: [Superadmin]
      summary: Editar empresa propia
      description: |
        Actualiza los datos de la empresa a la que pertenece el SUPERADMIN autenticado.

        **Reglas de negocio**
        - El SUPERADMIN solo puede editar su propia empresa — la empresa se obtiene automáticamente del JWT.
        - Al menos un campo debe estar presente en el body.
        - Todos los campos son opcionales pero al menos uno es obligatorio.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Al menos uno de los campos es obligatorio.
              properties:
                name:
                  type: string
                  maxLength: 150
                  example: Gimbernat S.A.
                cif_nif:
                  type: string
                  maxLength: 20
                  example: A12345678
                email:
                  type: string
                  format: email
                  example: contacto@gimbernat.com
                address_line:
                  type: string
                  maxLength: 200
                  example: Calle Mayor 1
                city:
                  type: string
                  maxLength: 100
                  example: Barcelona
                postal_code:
                  type: string
                  maxLength: 10
                  example: "08001"
                is_active:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Empresa actualizada correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchCompanyResponse"
        "400":
          description: Body vacío o campos inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: EMPTY_BODY
                  message: No se han enviado campos a actualizar
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "403":
          description: Token válido pero el usuario no tiene rol SUPERADMIN.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FORBIDDEN
                  message: No autorizado
        "404":
          description: Empresa no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: COMPANY_NOT_FOUND
                  message: Empresa no encontrada
