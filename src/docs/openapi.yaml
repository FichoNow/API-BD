        "409":
          description: Ya existe un proyecto con ese nombre en la empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: PROJECT_ALREADY_EXISTS
                  message: Ya existe un proyecto con ese nombre.

  /admin/project/{id}:
