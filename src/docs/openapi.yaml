        - Si el fichaje tiene `clock_out`, `started_at` no puede ser posterior a él (comparación por minuto).
        - Si la entry ya tiene `ended_at`, `started_at` no puede ser posterior a él (comparación por minuto).
      security:
        - bearerAuth: []
      parameters:
        - name: id
