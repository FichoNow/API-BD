            - `started_at` anterior al `clock_in` del fichaje (`ENTRY_STARTED_AT_BEFORE_CLOCK_IN`).
            - `started_at` posterior al `clock_out` del fichaje (`ENTRY_STARTED_AT_AFTER_CLOCK_OUT`).
            - `started_at` posterior al `ended_at` de la entry (`ENTRY_STARTED_AT_AFTER_ENDED_AT`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: ENTRY_STARTED_AT_BEFORE_CLOCK_IN
                  message: La hora de inicio no puede ser anterior a la entrada del fichaje.
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "404":
          description: Fichaje o entry no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FICHAJE_ENTRY_NOT_FOUND
                  message: Entry no encontrada.

