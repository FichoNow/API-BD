openapi: 3.0.3

info:
  title: FichajeApp API
  version: 1.0.0
  description: API REST para la gestión de fichajes y usuarios.

tags:
  - name: Auth
    description: Endpoints públicos de autenticación (sin token requerido).
  - name: "User › Perfil"
    description: |
      Gestión del perfil del usuario autenticado. Requieren `Authorization: Bearer <accessToken>`.

      El `id` del usuario **nunca se pasa como parámetro** — se extrae automáticamente del payload del access token.
  - name: "User › Fichajes"
    description: Operaciones sobre fichajes (entradas, salidas y correcciones). Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Fichajes › Entries"
    description: Bloques de proyecto dentro de un fichaje. Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Fichajes › Breaks"
    description: Descansos dentro de un fichaje. Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Calendar"
    description: Calendario mensual del usuario autenticado. Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Projects"
    description: Proyectos visibles para el usuario autenticado. Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Requests"
    description: Solicitudes de ausencia del usuario autenticado (vacaciones, permisos, etc.). Requieren `Authorization: Bearer <accessToken>`.
  - name: Admin
    description: >
      Endpoints de administración. Requieren `Authorization: Bearer <accessToken>`
      y que el usuario tenga rol `ADMINISTRATOR` o `SUPERADMIN`.
      Todas las acciones se realizan automáticamente en el contexto de la empresa
      a la que pertenece el administrador autenticado — no se puede operar sobre otras empresas.
  - name: Superadmin
    description: >
      Endpoints exclusivos del superadministrador. Requieren `Authorization: Bearer <accessToken>`
      y que el usuario tenga rol `SUPERADMIN`.
      Permiten editar los datos de la propia empresa.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Respuestas de error ──────────────────

    ErrorResponse:
      type: object
      properties:
        data:
          nullable: true
          example: null
        error:
          type: object
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
              example: Cuerpo de la solicitud inválido

    InternalServerError:
      type: object
      properties:
        data:
          nullable: true
          example: null
        error:
          type: object
          properties:
            code:
              type: string
              example: INTERNAL_SERVER_ERROR
            message:
              type: string
              example: Ha ocurrido un error inesperado

    # ── Respuestas de éxito ──────────────────

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: JWT de corta duración para autenticar peticiones.
            refreshToken:
              type: string
              description: Token de larga duración para renovar el access token.
            userData:
              type: object
              properties:
                name:
                  type: string
                  example: Juan García
                role:
                  type: string
                  enum: [USER, ADMINISTRATOR, SUPERADMIN]
                  example: USER
                email:
                  type: string
                  format: email
                  example: usuario@empresa.com
                companyName:
                  type: string
                  example: Gimbernat S.A.
                must_change_password:
                  type: boolean
                  description: Si es `true`, la app debe mostrar al usuario un popup para que cambie su contraseña.
                  example: false

    RefreshResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: Nuevo JWT de corta duración.
            refreshToken:
              type: string
              description: Nuevo refresh token (el anterior queda invalidado).

    RegisterResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            company:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                name:
                  type: string
                  example: Gimbernat S.L.
                cif_nif:
                  type: string
                  example: B12345678
                email:
                  type: string
                  format: email
                  example: contacto@gimbernat.com
                address_line:
                  type: string
                  example: Calle Mayor, 1
                city:
                  type: string
                  example: Barcelona
                postal_code:
                  type: string
                  example: "08001"
            user:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                name:
                  type: string
                  example: Juan García
                email:
                  type: string
                  format: email
                  example: admin@gimbernat.com
                role:
                  type: string
                  enum: [SUPERADMIN]
                  example: SUPERADMIN

    LogoutResponse:
      type: object
      properties:
        data:
          nullable: true
          example: null

    UpdateSelfResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            name:
              type: string
              example: Juan García
            email:
              type: string
              format: email
              example: usuario@empresa.com

    CreateUserResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 12
            company_id:
              type: integer
              example: 1
            department_id:
              type: integer
              example: 2
            group_id:
              type: integer
              nullable: true
              example: 3
            email:
              type: string
              format: email
              example: nuevo@empresa.com
            name:
              type: string
              example: Ana López
            role:
              type: string
              enum: [USER, ADMINISTRATOR, SUPERADMIN]
              example: USER
            is_active:
              type: boolean
              example: true
            must_change_password:
              type: boolean
              description: Indica que el usuario debe cambiar su contraseña en el próximo acceso.
              example: true

    CreateUsersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 12
              company_id:
                type: integer
                example: 1
              department_id:
                type: integer
                example: 2
              group_id:
                type: integer
                nullable: true
                example: 3
              email:
                type: string
                format: email
                example: nuevo@empresa.com
              name:
                type: string
                example: Ana López
              role:
                type: string
                enum: [USER, ADMINISTRATOR, SUPERADMIN]
                example: USER
              is_active:
                type: boolean
                example: true
              must_change_password:
                type: boolean
                description: Indica que el usuario debe cambiar su contraseña en el próximo acceso.
                example: true

    UpdateUserResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 7
            name:
              type: string
              example: Nuevo Nombre
            email:
              type: string
              format: email
              example: nuevo@email.com
            role:
              type: string
              enum: [USER, ADMINISTRATOR, SUPERADMIN]
              example: USER
            group_id:
              type: integer
              nullable: true
              example: 2
            is_active:
              type: boolean
              example: false
            must_change_password:
              type: boolean
              description: Indica si el usuario debe cambiar su contraseña en el próximo acceso. Se activa automáticamente cuando el administrador cambia la contraseña del usuario.
              example: true
            updated_at:
              type: string
              format: date-time
              example: "2025-03-24T10:30:00.000Z"

    CreateProjectResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 5
            department_id:
              type: integer
              example: 2
            group_id:
              type: integer
              nullable: true
              example: 3
            name:
              type: string
              example: Proyecto Alpha
            is_active:
              type: boolean
              example: true

    PatchProjectResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 5
            department_id:
              type: integer
              example: 2
            group_id:
              type: integer
              nullable: true
              example: 3
            name:
              type: string
              example: Proyecto Alpha Actualizado
            is_active:
              type: boolean
              example: false

    PatchCompanyResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: Gimbernat S.A.
            cif_nif:
              type: string
              example: A12345678
            email:
              type: string
              format: email
              example: contacto@gimbernat.com
            address_line:
              type: string
              example: Calle Mayor 1
            city:
              type: string
              example: Barcelona
            postal_code:
              type: string
              example: "08001"
            is_active:
              type: boolean
              example: true

    NullResponse:
      type: object
      properties:
        data:
          nullable: true
          example: null

    PostFichajeResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 42

    GetFichajesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 42
              clock_in:
                type: string
                format: date-time
                example: "2026-03-29T08:30:00.000Z"
              clock_out:
                type: string
                format: date-time
                nullable: true
                example: "2026-03-29T17:00:00.000Z"

    PostFichajeEntryResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 7

    GetFichajeEntriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 7
              fichaje_id:
                type: integer
                example: 42
              project_id:
                type: integer
                example: 3
              started_at:
                type: string
                format: date-time
                example: "2026-03-29T08:30:00.000Z"
              ended_at:
                type: string
                format: date-time
                nullable: true
                example: "2026-03-29T10:00:00.000Z"

    GetProjectsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 3
              name:
                type: string
                example: Proyecto Alpha

    PostFichajeBreakResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 5

    GetFichajeBreaksResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 3
              fichaje_id:
                type: integer
                example: 42
              started_at:
                type: string
                format: date-time
                example: "2026-03-29T12:00:00.000Z"
              ended_at:
                type: string
                format: date-time
                nullable: true
                example: "2026-03-29T12:30:00.000Z"

    GetCalendarMonthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            userId:
              type: integer
              example: 1
            year:
              type: integer
              example: 2026
            month:
              type: integer
              example: 4
            days:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    example: "2026-04-01"
                  isWorkingDay:
                    type: boolean
                    example: true
                  planned:
                    nullable: true
                    type: object
                    properties:
                      startTime:
                        type: string
                        example: "09:00"
                      endTime:
                        type: string
                        example: "17:00"
                      breakMinutes:
                        type: integer
                        example: 30
                      plannedMinutes:
                        type: integer
                        example: 450
                  statusType:
                    type: string
                    example: WORKED
                    description: >
                      Estado del día. Posibles valores: `WORKED`, `ABSENT`, `PLANNED`, `DAY_OFF`,
                      o un código de tipo de excepción definido por la empresa.

    # ── Solicitudes de ausencia ──────────────────

    LeaveRequestItem:
      type: object
      description: Solicitud de ausencia de un usuario.
      properties:
        id:
          type: integer
          example: 12
        type:
          type: string
          enum: [VACATION, PERMISSION, SICK_LEAVE, MEDICAL_APPOINTMENT, DAY_OFF]
          example: VACATION
        start_date:
          type: string
          format: date
          example: "2026-06-01"
        end_date:
          type: string
          format: date
          example: "2026-06-15"
        start_time:
          type: string
          format: time
          nullable: true
          example: null
          description: Hora de inicio (HH:MM:SS). Null si la ausencia es de días completos.
        end_time:
          type: string
          format: time
          nullable: true
          example: null
          description: Hora de fin (HH:MM:SS). Null si la ausencia es de días completos.
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CANCELLED]
          example: PENDING
        comment:
          type: string
          nullable: true
          maxLength: 255
          example: "Vacaciones de verano"

    GetLeaveRequestsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LeaveRequestItem"

    PostLeaveRequestBody:
      type: object
      required: [type, start_date, end_date]
      properties:
        type:
          type: string
          enum: [VACATION, PERMISSION, SICK_LEAVE, MEDICAL_APPOINTMENT, DAY_OFF]
          example: VACATION
        start_date:
          type: string
          format: date
          example: "2026-06-01"
        end_date:
          type: string
          format: date
          example: "2026-06-15"
        start_time:
          type: string
          nullable: true
          example: null
          description: >
            Hora de inicio (HH:MM:SS). Si se informa, `end_time` también debe venir informado.
            Si es una ausencia de días completos, omitir o enviar `null`.
        end_time:
          type: string
          nullable: true
          example: null
          description: >
            Hora de fin (HH:MM:SS). Si se informa, `start_time` también debe venir informado.
            Si es una ausencia de días completos, omitir o enviar `null`.
        comment:
          type: string
          maxLength: 255
          example: "Vacaciones de verano"

    PostLeaveRequestResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 12

paths:

  # ─────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Autentica a un usuario y devuelve los tokens de acceso junto con sus datos básicos.

        **Reglas de negocio**
        - El usuario debe existir y tener `is_active = true`.
        - La empresa del usuario debe existir y tener `is_active = true`.
        - La contraseña debe coincidir con el hash almacenado.
        - Todos los casos de error anteriores devuelven el mismo `401` intencionadamente — no se dan pistas sobre qué falló.
        - Limitado a **10 intentos por IP cada 15 minutos** para prevenir ataques de fuerza bruta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@empresa.com
                password:
                  type: string
                  example: "miContraseña123"
      responses:
        "200":
          description: Login correcto. Devuelve access token, refresh token y datos básicos del usuario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Body vacío, email o password ausentes, o email con formato inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "401":
          description: Credenciales incorrectas, usuario inactivo o empresa inactiva.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: UNAUTHORIZED
                  message: Credenciales incorrectas
        "429":
          description: Demasiados intentos desde la misma IP (más de 10 en 15 minutos).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Demasiados intentos. Inténtalo de nuevo en 15 minutos.

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: |
        Emite un nuevo access token a partir de un refresh token válido.

        **Reglas de negocio**
        - El refresh token debe existir en la base de datos y no haber expirado.
        - El usuario asociado debe existir y tener `is_active = true`.
        - La empresa del usuario debe existir y tener `is_active = true`.
        - El refresh token **se invalida** al usarlo (rotación de token) — se emite un nuevo refresh token junto con el nuevo access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Tokens renovados correctamente. Devuelve nuevo access token y nuevo refresh token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          description: Body vacío o refreshToken ausente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "401":
          description: Token no encontrado, expirado, usuario inactivo o empresa inactiva.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: TOKEN_EXPIRED
                  message: Token inválido

  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar empresa
      description: |
        Crea una nueva empresa junto con su usuario SUPERADMIN en una sola operación.

        **Qué hace internamente**
        1. Verifica que el email del usuario no esté ya registrado.
        2. Crea la empresa con los datos proporcionados (`is_active = true`).
        3. Crea automáticamente un departamento **"General"** vinculado a la empresa.
        4. Hashea la contraseña y crea el usuario con rol `SUPERADMIN` en ese departamento.

        **Reglas de negocio**
        - El email del usuario debe ser único en todo el sistema.
        - La contraseña debe tener al menos 8 caracteres.
        - Este endpoint es **público** — no requiere `Authorization`.
        - Limitado a **5 intentos por IP cada hora** para prevenir abusos.
        - Tras el registro el usuario debe hacer login en `POST /auth/login` para obtener tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company, user]
              properties:
                company:
                  type: object
                  required: [name, cif_nif, email, address_line, city, postal_code]
                  properties:
                    name:
                      type: string
                      maxLength: 150
                      example: Gimbernat S.L.
                    cif_nif:
                      type: string
                      maxLength: 20
                      example: B12345678
                    email:
                      type: string
                      format: email
                      example: contacto@gimbernat.com
                    address_line:
                      type: string
                      maxLength: 200
                      example: Calle Mayor, 1
                    city:
                      type: string
                      maxLength: 100
                      example: Barcelona
                    postal_code:
                      type: string
                      maxLength: 10
                      example: "08001"
                user:
                  type: object
                  required: [name, email, password]
                  properties:
                    name:
                      type: string
                      maxLength: 100
                      example: Juan García
                    email:
                      type: string
                      format: email
                      example: admin@gimbernat.com
                    password:
                      type: string
                      minLength: 8
                      example: "miContraseña123"
      responses:
        "201":
          description: Empresa y SUPERADMIN creados correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Body inválido, campos faltantes o contraseña demasiado corta.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "409":
          description: El email del usuario ya está registrado en el sistema.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: Ya existe un usuario con ese email.
        "429":
          description: Demasiados intentos desde la misma IP (más de 5 en 1 hora).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Demasiados intentos. Inténtalo de nuevo en 1 hora.
        "500":
          description: Error interno inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  # ─────────────────────────────────────────
  # USER
  # ─────────────────────────────────────────

  /user/update:
    patch:
      tags: ["User › Perfil"]
      summary: Actualizar perfil propio
      description: |
        Actualiza los datos del propio perfil del usuario autenticado.

        **Reglas de negocio**
        - Al menos un campo debe estar presente en el body.
        - Si se envía un nuevo email, no puede estar ya registrado por otro usuario.
        - La nueva contraseña **no se compara con la anterior** — se sobreescribe directamente.
        - Si se envía una nueva contraseña, `must_change_password` se desactiva a `false` automáticamente.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Al menos uno de los campos es obligatorio.
              properties:
                name:
                  type: string
                  example: Juan García
                email:
                  type: string
                  format: email
                  example: nuevo@email.com
                password:
                  type: string
                  example: nuevaContraseña456
      responses:
        "200":
          description: Perfil actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSelfResponse"
        "400":
          description: Body vacío o sin campos reconocidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: NO_FIELDS_TO_UPDATE
                  message: No hay campos para actualizar.
        "401":
          description: Token ausente o inválido. Lanzado por el middleware antes de llegar al controller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "404":
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: USER_NOT_FOUND
                  message: Usuario no encontrado
        "409":
          description: El email ya está registrado por otro usuario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: Ya existe un usuario con ese email.
        "500":
          description: |
            Error interno inesperado. Posibles causas reales:
            - `UPDATE_FAILED` — el update en BD devolvió un resultado inesperado.
            - `USER_NOT_FOUND` — el usuario se actualizó correctamente pero no pudo recuperarse justo después (caso extremadamente raro).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
              example:
                data: null
                error:
                  code: UPDATE_FAILED
                  message: Error al actualizar el usuario.

  /user/logout:
    delete:
      tags: ["User › Perfil"]
      summary: Logout
      description: |
        Cierra la sesión del usuario eliminando su refresh token de la base de datos.

        **Reglas de negocio**
