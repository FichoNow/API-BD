  /user/fichajes/{id}/entries:
    post:
      tags: ["User › Fichajes › Entries"]
      summary: Crear entry de fichaje
      description: |
        Crea un nuevo bloque de proyecto dentro de un fichaje existente.

        **Formato de fechas**
        Todos los campos de fecha/hora deben enviarse en formato **ISO 8601 UTC**:
        `"YYYY-MM-DDTHH:mm:ss.sssZ"`

        **Reglas de negocio**
        - El fichaje debe pertenecer al usuario autenticado.
        - El proyecto debe existir.
        - `started_at` no puede ser anterior al `clock_in` del fichaje (comparación por minuto — se permite el mismo minuto).
        - Si el fichaje tiene `clock_out`, `started_at` no puede ser posterior a él (comparación por minuto).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del fichaje al que pertenece la entry.
          schema:
            type: integer
            example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, started_at]
              properties:
                project_id:
                  type: integer
                  example: 3
                started_at:
                  type: string
                  format: date-time
                  description: Hora de inicio del bloque en formato ISO 8601 UTC.
                  example: "2026-03-29T08:30:00.000Z"
      responses:
        "201":
          description: Entry creada correctamente. Devuelve el ID de la nueva entry.
