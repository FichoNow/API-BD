  /user/fichajes/{id}/entries/{entryId}/end:
    patch:
      tags: ["User › Fichajes › Entries"]
      summary: Establecer hora de fin de una entry
      description: |
        Establece o corrige la hora de fin (`ended_at`) de una entry de fichaje.

        **Formato de fechas**
        Todos los campos de fecha/hora deben enviarse en formato **ISO 8601 UTC**:
        `"YYYY-MM-DDTHH:mm:ss.sssZ"`

        **Reglas de negocio**
        - El fichaje debe pertenecer al usuario autenticado.
        - La entry debe pertenecer al fichaje indicado.
        - `ended_at` no puede ser igual o anterior a `started_at` (comparación por minuto — se permite el mismo minuto solo si el segundo difiere, pero el picker siempre envía segundos=0 así que en la práctica deben ser minutos distintos).
        - `ended_at` no puede ser anterior al `clock_in` del fichaje (comparación por minuto).
        - Si el fichaje tiene `clock_out`, `ended_at` no puede ser posterior a él (comparación por minuto).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del fichaje.
          schema:
            type: integer
            example: 42
        - name: entryId
          in: path
          required: true
          description: ID de la entry a actualizar.
          schema:
            type: integer
            example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ended_at]
              properties:
                ended_at:
                  type: string
                  format: date-time
                  description: Hora de fin en formato ISO 8601 UTC.
                  example: "2026-03-29T10:00:00.000Z"
      responses:
        "200":
          description: Hora de fin actualizada correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NullResponse"
        "400":
          description: |
            Alguno de estos casos:
            - Body inválido o campos faltantes (`BAD_REQUEST`).
            - `ended_at` igual o anterior a `started_at` (`ENTRY_ENDED_AT_BEFORE_STARTED_AT`).
            - `ended_at` anterior al `clock_in` del fichaje (`ENTRY_ENDED_AT_BEFORE_CLOCK_IN`).
            - `ended_at` posterior al `clock_out` del fichaje (`ENTRY_ENDED_AT_AFTER_CLOCK_OUT`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: ENTRY_ENDED_AT_BEFORE_STARTED_AT
                  message: La hora de fin no puede ser anterior o igual a la hora de inicio.
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "404":
          description: Fichaje o entry no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FICHAJE_ENTRY_NOT_FOUND
                  message: Entry no encontrada.

