        - name: entryId
          in: path
          required: true
          description: ID de la entry a actualizar.
          schema:
            type: integer
            example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [started_at]
              properties:
                started_at:
                  type: string
                  format: date-time
                  description: Nueva hora de inicio en formato ISO 8601 UTC.
                  example: "2026-03-29T09:00:00.000Z"
      responses:
        "200":
          description: Hora de inicio actualizada correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NullResponse"
        "400":
          description: |
