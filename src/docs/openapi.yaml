            - Body inválido o campos faltantes (`BAD_REQUEST`).
            - `started_at` anterior al `clock_in` del fichaje (`ENTRY_STARTED_AT_BEFORE_CLOCK_IN`).
            - `started_at` posterior al `clock_out` del fichaje (`ENTRY_STARTED_AT_AFTER_CLOCK_OUT`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: ENTRY_STARTED_AT_BEFORE_CLOCK_IN
                  message: La hora de inicio no puede ser anterior a la entrada del fichaje.
        "401":
