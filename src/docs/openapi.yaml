openapi: 3.0.3

info:
  title: FichoNow API
  version: 1.0.0
  description: API REST para la gestión de fichajes y usuarios.

tags:
  - name: Auth
    description: Endpoints públicos de autenticación (sin token requerido).
  - name: "User › Perfil"
    description: |
      Gestión del perfil del usuario autenticado. Requieren `Authorization: Bearer <accessToken>`.

      El `id` del usuario **nunca se pasa como parámetro** — se extrae automáticamente del payload del access token.
  - name: "User › Fichajes"
    description: Operaciones sobre fichajes (entradas, salidas y correcciones). Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Fichajes › Entries"
    description: Bloques de proyecto dentro de un fichaje. Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Fichajes › Breaks"
    description: Descansos dentro de un fichaje. Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Calendar"
    description: Calendario mensual del usuario autenticado. Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Projects"
    description: Proyectos visibles para el usuario autenticado. Requieren `Authorization: Bearer <accessToken>`.
  - name: "User › Requests"
    description: Solicitudes de ausencia del usuario autenticado (vacaciones, permisos, etc.). Requieren `Authorization: Bearer <accessToken>`.
  - name: Admin
    description: >
      Endpoints de administración. Requieren `Authorization: Bearer <accessToken>`
      y que el usuario tenga rol `ADMINISTRATOR` o `SUPERADMIN`.
      Todas las acciones se realizan automáticamente en el contexto de la empresa
      a la que pertenece el administrador autenticado — no se puede operar sobre otras empresas.
  - name: "Admin › Users"
    description: Gestión de usuarios dentro de la empresa del administrador autenticado.
  - name: "Admin › Projects"
    description: Gestión de proyectos dentro de la empresa del administrador autenticado.
  - name: "Admin › Groups"
    description: Gestión de grupos de trabajo dentro de un departamento.
  - name: "Admin › Requests"
    description: Solicitudes de ausencia desde el panel admin (revisión, aprobación y rechazo).
  - name: "Admin › Schedules"
    description: Plantillas de horario y asignaciones a grupos / usuarios.
  - name: "Admin › Stats"
    description: >
      Estadísticas del panel admin. Todos los endpoints requieren `departmentId` como query param y
      filtran automáticamente por la empresa del administrador. Si el rol es `ADMINISTRATOR`,
      solo se permiten consultas sobre su propio departamento.
  - name: Superadmin
    description: >
      Endpoints exclusivos del superadministrador. Requieren `Authorization: Bearer <accessToken>`
      y que el usuario tenga rol `SUPERADMIN`.
      Permiten editar los datos de la propia empresa.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Schedules (plantillas y asignaciones) ──

    ScheduleDay:
      type: object
      required: [weekday, is_working_day, start_time, end_time, break_minutes]
      properties:
        weekday:
          type: integer
          minimum: 1
          maximum: 7
          description: 1 = lunes ... 7 = domingo
        is_working_day:
          type: boolean
        start_time:
          type: string
          nullable: true
          pattern: '^\d{2}:\d{2}:\d{2}$'
          example: "09:00:00"
        end_time:
          type: string
          nullable: true
          pattern: '^\d{2}:\d{2}:\d{2}$'
          example: "18:00:00"
        break_minutes:
          type: integer
          minimum: 0

    CreateScheduleRequest:
      type: object
      required: [department_id, name, is_active, days]
      properties:
        department_id: { type: integer }
        name:          { type: string, minLength: 1, maxLength: 120 }
        description:   { type: string, nullable: true, maxLength: 255 }
        is_active:     { type: boolean }
        days:
          type: array
          minItems: 7
          maxItems: 7
          items:
            $ref: "#/components/schemas/ScheduleDay"

    ScheduleTemplateSummary:
      type: object
      properties:
        data:
          type: object
          properties:
            id:             { type: integer }
            department_id:  { type: integer }
            name:           { type: string }
            description:    { type: string, nullable: true }
            weekly_minutes: { type: integer }
            is_active:      { type: boolean }

    # ── Respuestas de error ──────────────────

    ErrorResponse:
      type: object
      properties:
        data:
          nullable: true
          example: null
        error:
          type: object
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
              example: Cuerpo de la solicitud inválido

    InternalServerError:
      type: object
      properties:
        data:
          nullable: true
          example: null
        error:
          type: object
          properties:
            code:
              type: string
              example: INTERNAL_SERVER_ERROR
            message:
              type: string
              example: Ha ocurrido un error inesperado

    # ── Respuestas de éxito ──────────────────

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: JWT de corta duración para autenticar peticiones.
            refreshToken:
              type: string
              description: Token de larga duración para renovar el access token.
            userData:
              type: object
              properties:
                name:
                  type: string
                  example: Juan García
                role:
                  type: string
                  enum: [USER, ADMINISTRATOR, SUPERADMIN]
                  example: USER
                email:
                  type: string
                  format: email
                  example: usuario@empresa.com
                companyName:
                  type: string
                  example: Gimbernat S.A.
                must_change_password:
                  type: boolean
                  description: Si es `true`, la app debe mostrar al usuario un popup para que cambie su contraseña.
                  example: false

    RefreshResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: Nuevo JWT de corta duración.
            refreshToken:
              type: string
              description: Nuevo refresh token (el anterior queda invalidado).

    RegisterResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            company:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                name:
                  type: string
                  example: Gimbernat S.L.
                cif_nif:
                  type: string
                  example: B12345678
                email:
                  type: string
                  format: email
                  example: contacto@gimbernat.com
                address_line:
                  type: string
                  example: Calle Mayor, 1
                city:
                  type: string
                  example: Barcelona
                postal_code:
                  type: string
                  example: "08001"
            user:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                name:
                  type: string
                  example: Juan García
                email:
                  type: string
                  format: email
                  example: admin@gimbernat.com
                role:
                  type: string
                  enum: [SUPERADMIN]
                  example: SUPERADMIN

    LogoutResponse:
      type: object
      properties:
        data:
          nullable: true
          example: null

    UpdateSelfResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            name:
              type: string
              example: Juan García
            email:
              type: string
              format: email
              example: usuario@empresa.com

    CreateUserResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 12
            company_id:
              type: integer
              example: 1
            department_id:
              type: integer
              example: 2
            group_id:
              type: integer
              nullable: true
              example: 3
            email:
              type: string
              format: email
              example: nuevo@empresa.com
            name:
              type: string
              example: Ana López
            role:
              type: string
              enum: [USER, ADMINISTRATOR, SUPERADMIN]
              example: USER
            is_active:
              type: boolean
              example: true
            must_change_password:
              type: boolean
              description: Indica que el usuario debe cambiar su contraseña en el próximo acceso.
              example: true

    CreateUsersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 12
              company_id:
                type: integer
                example: 1
              department_id:
                type: integer
                example: 2
              group_id:
                type: integer
                nullable: true
                example: 3
              email:
                type: string
                format: email
                example: nuevo@empresa.com
              name:
                type: string
                example: Ana López
              role:
                type: string
                enum: [USER, ADMINISTRATOR, SUPERADMIN]
                example: USER
              is_active:
                type: boolean
                example: true
              must_change_password:
                type: boolean
                description: Indica que el usuario debe cambiar su contraseña en el próximo acceso.
                example: true

    UpdateUserResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 7
            name:
              type: string
              example: Nuevo Nombre
            email:
              type: string
              format: email
              example: nuevo@email.com
            role:
              type: string
              enum: [USER, ADMINISTRATOR, SUPERADMIN]
              example: USER
            group_id:
              type: integer
              nullable: true
              example: 2
            is_active:
              type: boolean
              example: false
            must_change_password:
              type: boolean
              description: Indica si el usuario debe cambiar su contraseña en el próximo acceso. Se activa automáticamente cuando el administrador cambia la contraseña del usuario.
              example: true
            updated_at:
              type: string
              format: date-time
              example: "2025-03-24T10:30:00.000Z"

    CreateProjectResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 5
            department_id:
              type: integer
              example: 2
            group_id:
              type: integer
              nullable: true
              example: 3
            name:
              type: string
              example: Proyecto Alpha
            is_active:
              type: boolean
              example: true

    PatchProjectResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 5
            department_id:
              type: integer
              example: 2
            group_id:
              type: integer
              nullable: true
              example: 3
            name:
              type: string
              example: Proyecto Alpha Actualizado
            is_active:
              type: boolean
              example: false

    GetCompanyInfoResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            company:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                name:
                  type: string
                  example: Gimbernat S.L.
            departments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 2
                  name:
                    type: string
                    example: General

    PatchCompanyResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: Gimbernat S.A.
            cif_nif:
              type: string
              example: A12345678
            email:
              type: string
              format: email
              example: contacto@gimbernat.com
            address_line:
              type: string
              example: Calle Mayor 1
            city:
              type: string
              example: Barcelona
            postal_code:
              type: string
              example: "08001"
            is_active:
              type: boolean
              example: true

    NullResponse:
      type: object
      properties:
        data:
          nullable: true
          example: null

    PostFichajeResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 42

    GetFichajesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 42
              clock_in:
                type: string
                format: date-time
                example: "2026-03-29T08:30:00.000Z"
              clock_out:
                type: string
                format: date-time
                nullable: true
                example: "2026-03-29T17:00:00.000Z"

    PostFichajeEntryResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 7

    GetFichajeEntriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 7
              fichaje_id:
                type: integer
                example: 42
              project_id:
                type: integer
                example: 3
              started_at:
                type: string
                format: date-time
                example: "2026-03-29T08:30:00.000Z"
              ended_at:
                type: string
                format: date-time
                nullable: true
                example: "2026-03-29T10:00:00.000Z"

    GetProjectsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 3
              name:
                type: string
                example: Proyecto Alpha

    PostFichajeBreakResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 5

    GetFichajeBreaksResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 3
              fichaje_id:
                type: integer
                example: 42
              started_at:
                type: string
                format: date-time
                example: "2026-03-29T12:00:00.000Z"
              ended_at:
                type: string
                format: date-time
                nullable: true
                example: "2026-03-29T12:30:00.000Z"

    GetCalendarMonthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            userId:
              type: integer
              example: 1
            year:
              type: integer
              example: 2026
            month:
              type: integer
              example: 4
            days:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    example: "2026-04-01"
                  isWorkingDay:
                    type: boolean
                    example: true
                  planned:
                    nullable: true
                    type: object
                    properties:
                      startTime:
                        type: string
                        example: "09:00"
                      endTime:
                        type: string
                        example: "17:00"
                      breakMinutes:
                        type: integer
                        example: 30
                      plannedMinutes:
                        type: integer
                        example: 450
                  statusType:
                    type: string
                    example: WORKED
                    description: >
                      Estado del día. Posibles valores: `WORKED`, `ABSENT`, `PLANNED`, `DAY_OFF`,
                      o un código de tipo de excepción definido por la empresa.

    # ── Solicitudes de ausencia ──────────────────

    LeaveRequestItem:
      type: object
      description: Solicitud de ausencia de un usuario.
      properties:
        id:
          type: integer
          example: 12
        type:
          type: string
          enum: [VACATION, PERMISSION, SICK_LEAVE, MEDICAL_APPOINTMENT, DAY_OFF]
          example: VACATION
        start_date:
          type: string
          format: date
          example: "2026-06-01"
        end_date:
          type: string
          format: date
          example: "2026-06-15"
        start_time:
          type: string
          format: time
          nullable: true
          example: null
          description: Hora de inicio (HH:MM:SS). Null si la ausencia es de días completos.
        end_time:
          type: string
          format: time
          nullable: true
          example: null
          description: Hora de fin (HH:MM:SS). Null si la ausencia es de días completos.
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CANCELLED]
          example: PENDING
        comment:
          type: string
          nullable: true
          maxLength: 255
          example: "Vacaciones de verano"

    GetLeaveRequestsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LeaveRequestItem"

    PostLeaveRequestBody:
      type: object
      required: [type, start_date, end_date]
      properties:
        type:
          type: string
          enum: [VACATION, PERMISSION, SICK_LEAVE, MEDICAL_APPOINTMENT, DAY_OFF]
          example: VACATION
        start_date:
          type: string
          format: date
          example: "2026-06-01"
        end_date:
          type: string
          format: date
          example: "2026-06-15"
        start_time:
          type: string
          nullable: true
          example: null
          description: >
            Hora de inicio (HH:MM:SS). Si se informa, `end_time` también debe venir informado.
            Si es una ausencia de días completos, omitir o enviar `null`.
        end_time:
          type: string
          nullable: true
          example: null
          description: >
            Hora de fin (HH:MM:SS). Si se informa, `start_time` también debe venir informado.
            Si es una ausencia de días completos, omitir o enviar `null`.
        comment:
          type: string
          maxLength: 255
          example: "Vacaciones de verano"

    PostLeaveRequestResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 12

    # ── Admin · Users ──────────────────

    GetUsersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 7
              name:
                type: string
                example: Ana López
              email:
                type: string
                format: email
                example: ana@empresa.com
              role:
                type: string
                enum: [USER, ADMINISTRATOR, SUPERADMIN]
                example: USER
              is_active:
                type: boolean
                example: true
              must_change_password:
                type: boolean
                example: false
              group_id:
                type: integer
                nullable: true
                example: 3

    DeleteUserResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 7

    # ── Admin · Groups ─────────────────

    WorkGroup:
      type: object
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: Equipo Backend
        department_id:
          type: integer
          example: 2

    GetGroupsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WorkGroup"

    GroupResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/WorkGroup"

    DeleteGroupResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 3

    # ── Admin · Requests ───────────────

    AdminRequestItem:
      type: object
      description: Solicitud de ausencia tal y como la ve el panel admin (incluye datos del empleado y de la revisión).
      properties:
        id:
          type: integer
          example: 12
        user_id:
          type: integer
          example: 7
        employee_name:
          type: string
          example: Ana López
        employee_email:
          type: string
          format: email
          example: ana@empresa.com
        department_id:
          type: integer
          example: 2
        type:
          type: string
          enum: [VACATION, PERMISSION, SICK_LEAVE, MEDICAL_APPOINTMENT, DAY_OFF]
          example: VACATION
        start_date:
          type: string
          format: date
          example: "2026-06-01"
        end_date:
          type: string
          format: date
          example: "2026-06-15"
        start_time:
          type: string
          format: time
          nullable: true
          example: null
        end_time:
          type: string
          format: time
          nullable: true
          example: null
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CANCELLED]
          example: PENDING
        comment:
          type: string
          nullable: true
          example: "Vacaciones de verano"
        reviewed_by:
          type: integer
          nullable: true
          example: null
        reviewed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        review_comment:
          type: string
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2026-04-15T09:30:00.000Z"

    GetAdminRequestsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminRequestItem"

    ReviewRequestResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 12
            status:
              type: string
              enum: [APPROVED, REJECTED]
              example: APPROVED
            reviewed_by:
              type: integer
              example: 1
            reviewed_at:
              type: string
              format: date-time
              example: "2026-04-15T10:30:00.000Z"
            review_comment:
              type: string
              nullable: true
              example: "Aprobado sin condiciones"

    # ── Admin · Stats ──────────────────

    DayStats:
      type: object
      properties:
        weekday:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-04-01"
        regular_minutes:
          type: integer
          example: 480
        overtime_minutes:
          type: integer
          example: 30

    StatsOverviewResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            period_label:
              type: string
              example: "Abril 2026"
            total_minutes:
              type: integer
              example: 9600
            overtime_minutes:
              type: integer
              example: 240
            punctuality_rate:
              type: number
              format: float
              example: 0.92
            active_absences:
              type: integer
              example: 2
            pending_requests:
              type: integer
              example: 5
            employees_active:
              type: integer
              example: 18
            employees_total:
              type: integer
              example: 20
            daily:
              type: array
              items:
                $ref: "#/components/schemas/DayStats"
            total_minutes_prev:
              type: integer
              example: 9100
            overtime_minutes_prev:
              type: integer
              example: 200
            punctuality_rate_prev:
              type: number
              format: float
              example: 0.89

    StatsRankingResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            employees:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 7
                  name:
                    type: string
                    example: Ana López
                  regular_minutes:
                    type: integer
                    example: 9000
                  overtime_minutes:
                    type: integer
                    example: 300
                  total_minutes:
                    type: integer
                    example: 9300
                  punctuality_rate:
                    type: number
                    format: float
                    example: 0.95

    StatsProjectsPeriodResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            projects:
              type: array
              items:
                type: object
                properties:
                  project_name:
                    type: string
                    example: Proyecto Alpha
                  minutes:
                    type: integer
                    example: 1200

    StatsActiveNowResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            active:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 7
                  name:
                    type: string
                    example: Ana López
                  clock_in:
