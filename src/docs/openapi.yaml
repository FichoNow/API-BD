        "500":
          description: |
            Error interno inesperado. Posibles causas reales:
            - `UPDATE_FAILED` — el update en BD devolvió un resultado inesperado.
            - `USER_NOT_FOUND` — el usuario se actualizó correctamente pero no pudo recuperarse justo después (caso extremadamente raro).
          content:
