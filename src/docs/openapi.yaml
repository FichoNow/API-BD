paths:

  # ─────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Autentica a un usuario y devuelve los tokens de acceso junto con sus datos básicos.

        **Reglas de negocio**
        - El usuario debe existir y tener `is_active = true`.
        - La empresa del usuario debe existir y tener `is_active = true`.
        - La contraseña debe coincidir con el hash almacenado.
        - Todos los casos de error anteriores devuelven el mismo `401` intencionadamente — no se dan pistas sobre qué falló.
        - Limitado a **10 intentos por IP cada 15 minutos** para prevenir ataques de fuerza bruta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@empresa.com
                password:
                  type: string
                  example: "miContraseña123"
      responses:
        "200":
          description: Login correcto. Devuelve access token, refresh token y datos básicos del usuario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Body vacío, email o password ausentes, o email con formato inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "401":
          description: Credenciales incorrectas, usuario inactivo o empresa inactiva.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: UNAUTHORIZED
                  message: Credenciales incorrectas
        "429":
          description: Demasiados intentos desde la misma IP (más de 10 en 15 minutos).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Demasiados intentos. Inténtalo de nuevo en 15 minutos.

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: |
        Emite un nuevo access token a partir de un refresh token válido.

        **Reglas de negocio**
        - El refresh token debe existir en la base de datos y no haber expirado.
        - El usuario asociado debe existir y tener `is_active = true`.
        - La empresa del usuario debe existir y tener `is_active = true`.
        - El refresh token **se invalida** al usarlo (rotación de token) — se emite un nuevo refresh token junto con el nuevo access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Tokens renovados correctamente. Devuelve nuevo access token y nuevo refresh token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          description: Body vacío o refreshToken ausente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "401":
          description: Token no encontrado, expirado, usuario inactivo o empresa inactiva.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: TOKEN_EXPIRED
                  message: Token inválido

  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar empresa
      description: |
        Crea una nueva empresa junto con su usuario SUPERADMIN en una sola operación.

        **Qué hace internamente**
        1. Verifica que el email del usuario no esté ya registrado.
        2. Crea la empresa con los datos proporcionados (`is_active = true`).
        3. Crea automáticamente un departamento **"General"** vinculado a la empresa.
        4. Hashea la contraseña y crea el usuario con rol `SUPERADMIN` en ese departamento.

        **Reglas de negocio**
        - El email del usuario debe ser único en todo el sistema.
        - La contraseña debe tener al menos 8 caracteres.
        - Este endpoint es **público** — no requiere `Authorization`.
        - Limitado a **5 intentos por IP cada hora** para prevenir abusos.
        - Tras el registro el usuario debe hacer login en `POST /auth/login` para obtener tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company, user]
              properties:
                company:
                  type: object
                  required: [name, cif_nif, email, address_line, city, postal_code]
                  properties:
                    name:
                      type: string
                      maxLength: 150
                      example: Gimbernat S.L.
                    cif_nif:
                      type: string
                      maxLength: 20
                      example: B12345678
                    email:
                      type: string
                      format: email
                      example: contacto@gimbernat.com
                    address_line:
                      type: string
                      maxLength: 200
                      example: Calle Mayor, 1
                    city:
                      type: string
                      maxLength: 100
                      example: Barcelona
                    postal_code:
                      type: string
                      maxLength: 10
                      example: "08001"
                user:
                  type: object
                  required: [name, email, password]
                  properties:
                    name:
                      type: string
                      maxLength: 100
                      example: Juan García
                    email:
                      type: string
                      format: email
                      example: admin@gimbernat.com
                    password:
                      type: string
                      minLength: 8
                      example: "miContraseña123"
      responses:
        "201":
          description: Empresa y SUPERADMIN creados correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Body inválido, campos faltantes o contraseña demasiado corta.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "409":
          description: El email del usuario ya está registrado en el sistema.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: Ya existe un usuario con ese email.
        "429":
          description: Demasiados intentos desde la misma IP (más de 5 en 1 hora).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Demasiados intentos. Inténtalo de nuevo en 1 hora.
        "500":
          description: Error interno inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"

  # ─────────────────────────────────────────
  # USER
  # ─────────────────────────────────────────

  /user/update:
    patch:
      tags: ["User › Perfil"]
      summary: Actualizar perfil propio
      description: |
        Actualiza los datos del propio perfil del usuario autenticado.

        **Reglas de negocio**
        - Al menos un campo debe estar presente en el body.
        - Si se envía un nuevo email, no puede estar ya registrado por otro usuario.
        - La nueva contraseña **no se compara con la anterior** — se sobreescribe directamente.
        - Si se envía una nueva contraseña, `must_change_password` se desactiva a `false` automáticamente.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Al menos uno de los campos es obligatorio.
              properties:
                name:
                  type: string
                  example: Juan García
                email:
                  type: string
                  format: email
                  example: nuevo@email.com
                password:
                  type: string
                  example: nuevaContraseña456
      responses:
        "200":
          description: Perfil actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSelfResponse"
        "400":
          description: Body vacío o sin campos reconocidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: NO_FIELDS_TO_UPDATE
                  message: No hay campos para actualizar.
        "401":
          description: Token ausente o inválido. Lanzado por el middleware antes de llegar al controller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "404":
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: USER_NOT_FOUND
                  message: Usuario no encontrado
        "409":
          description: El email ya está registrado por otro usuario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: Ya existe un usuario con ese email.
        "500":
          description: |
            Error interno inesperado. Posibles causas reales:
            - `UPDATE_FAILED` — el update en BD devolvió un resultado inesperado.
            - `USER_NOT_FOUND` — el usuario se actualizó correctamente pero no pudo recuperarse justo después (caso extremadamente raro).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
              example:
                data: null
                error:
                  code: UPDATE_FAILED
                  message: Error al actualizar el usuario.

  /user/logout:
    delete:
      tags: ["User › Perfil"]
      summary: Logout
      description: |
        Cierra la sesión del usuario eliminando su refresh token de la base de datos.

        **Reglas de negocio**
        - Si el refresh token no existe (ya fue eliminado o nunca fue válido), se responde igualmente con `200` — no se expone información sobre el estado del token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Sesión cerrada correctamente (o token ya inexistente).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "400":
          description: Body vacío o refreshToken ausente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "401":
          description: Token ausente o inválido. Lanzado por el middleware antes de llegar al controller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado

  # ─────────────────────────────────────────
  # ADMIN
  # ─────────────────────────────────────────

  /admin/company-info:
    get:
      tags: ["Admin › Users"]
      summary: Info de empresa y departamentos
      description: |
        Devuelve el nombre de la empresa y la lista de departamentos visibles para el administrador autenticado.

        **Reglas de negocio**
        - Si el rol es `SUPERADMIN`, devuelve todos los departamentos de la empresa.
        - Si el rol es `ADMINISTRATOR`, devuelve únicamente su propio departamento.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Información de la empresa y departamentos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCompanyInfoResponse"
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: El usuario no tiene rol ADMINISTRATOR ni SUPERADMIN.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Empresa o departamento no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      tags: ["Admin › Users"]
      summary: Listar usuarios de un departamento
      description: |
        Devuelve la lista de usuarios de un departamento concreto.

        **Reglas de negocio**
        - El `departmentId` es obligatorio (query param).
        - El departamento debe pertenecer a la empresa del administrador autenticado.
        - Si el rol es `ADMINISTRATOR`, solo puede consultar usuarios de su propio departamento.
        - Si el rol es `SUPERADMIN`, puede consultar cualquier departamento de su empresa.
      security:
        - bearerAuth: []
      parameters:
        - name: departmentId
          in: query
          required: true
          description: ID del departamento del que se quieren listar los usuarios.
          schema:
            type: integer
            example: 2
      responses:
        "200":
          description: Lista de usuarios del departamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUsersResponse"
        "400":
          description: Query param `departmentId` ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: El parámetro departmentId es requerido y debe ser un número válido
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "403":
          description: Token válido pero el usuario no tiene rol ADMINISTRATOR ni SUPERADMIN, o un ADMINISTRATOR intenta acceder a un departamento que no es el suyo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FORBIDDEN
                  message: No autorizado
        "404":
          description: Departamento no encontrado o pertenece a otra empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: DEPARTMENT_NOT_FOUND
                  message: Departamento no encontrado.

    post:
      tags: ["Admin › Users"]
      summary: Crear usuarios en bulk
      description: |
        Crea entre 2 y 50 usuarios en una sola petición.

        **Reglas de negocio**
        - Todos los usuarios se crean en la empresa (`company_id`) del administrador autenticado.
        - Cada `group_id` debe pertenecer a esa misma empresa.
        - Ningún email puede estar ya registrado en el sistema.
        - Las validaciones se ejecutan **todas antes de crear** — si hay errores, no se crea ningún usuario y se devuelven todos los mensajes de error en el campo `message`, separados por saltos de línea.
        - Los usuarios válidos se crean en paralelo.
        - `must_change_password` se activa a `true` automáticamente en todos los usuarios creados — deberán cambiar su contraseña en el primer acceso.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 2
              maxItems: 50
              items:
                type: object
                required: [department_id, email, name, role, password, is_active]
                properties:
                  department_id:
                    type: integer
                    example: 2
                  group_id:
                    type: integer
                    nullable: true
                    example: 3
                  email:
                    type: string
                    format: email
                    example: nuevo@empresa.com
                  name:
                    type: string
                    example: Ana López
                  role:
                    type: string
                    enum: [USER, ADMINISTRATOR, SUPERADMIN]
                  password:
                    type: string
                    example: contraseñaSegura789
                  is_active:
                    type: boolean
                    example: true
      responses:
        "201":
          description: Todos los usuarios creados correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUsersResponse"
        "400":
          description: Body inválido, campos faltantes, o array fuera del rango permitido (menos de 2 o más de 50 elementos).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "403":
          description: Token válido pero el usuario no tiene rol ADMINISTRATOR.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FORBIDDEN
                  message: No autorizado
        "409":
          description: |
            Uno o más usuarios no pasaron validación. No se ha creado ningún usuario.
            El campo `message` contiene todos los errores encontrados, uno por línea.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BULK_USER_VALIDATION_ERROR
                  message: "El grupo del usuario a@empresa.com no existe.\nYa existe un usuario con el email b@empresa.com."

  /admin/user:
    post:
      tags: ["Admin › Users"]
      summary: Crear usuario individual
      description: |
        Crea un nuevo usuario con rol `USER` o `ADMINISTRATOR`.

        **Reglas de negocio**
        - El usuario se crea automáticamente en la empresa (`company_id`) a la que pertenece el administrador autenticado — no se puede especificar otra empresa.
        - El `group_id` debe pertenecer a esa misma empresa.
        - El email no puede estar ya registrado en el sistema.
        - `must_change_password` se activa a `true` automáticamente al crear el usuario — deberá cambiar su contraseña en el primer acceso.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [department_id, email, name, role, password, is_active]
              properties:
                department_id:
                  type: integer
                  example: 2
                group_id:
                  type: integer
                  nullable: true
                  example: 3
                email:
                  type: string
                  format: email
                  example: nuevo@empresa.com
                name:
                  type: string
                  example: Ana López
                role:
                  type: string
                  enum: [USER, ADMINISTRATOR, SUPERADMIN]
                password:
                  type: string
                  example: contraseñaSegura789
                is_active:
                  type: boolean
                  example: true
      responses:
        "201":
          description: Usuario creado correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
        "400":
          description: Body inválido o campos faltantes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: Cuerpo de la solicitud inválido
        "401":
          description: Token ausente o inválido. Lanzado por el middleware antes de llegar al controller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "403":
          description: Token válido pero el usuario no tiene rol ADMINISTRATOR.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FORBIDDEN
                  message: No autorizado
        "404":
          description: El group_id no existe o no pertenece a la empresa del administrador.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: GROUP_NOT_FOUND
                  message: Grupo no encontrado.
        "409":
          description: El email ya está registrado en el sistema.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: Ya existe un usuario con ese email.
        "500":
          description: |
            Error interno inesperado. Posibles causas reales:
            - `USER_NOT_FOUND` — el usuario se creó correctamente en BD pero no pudo recuperarse justo después (caso extremadamente raro).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
              example:
                data: null
                error:
                  code: USER_NOT_FOUND
                  message: Error al crear el usuario.

  /admin/user/{id}:
    patch:
      tags: ["Admin › Users"]
      summary: Editar usuario
      description: |
        Actualiza los datos de un usuario con rol `USER`.

        **Reglas de negocio**
        - El usuario a editar debe pertenecer a la misma empresa que el administrador.
        - No se puede editar a un usuario con rol `ADMINISTRATOR`.
        - Los dos casos anteriores devuelven el mismo `404` intencionadamente — no se dan pistas sobre si el usuario existe.
        - Si se envía un nuevo email, no puede estar ya registrado por otro usuario.
        - Al menos un campo debe estar presente en el body.
        - La nueva contraseña **no se compara con la anterior** — se sobreescribe directamente.
        - Si se envía una nueva contraseña, `must_change_password` se activa a `true` automáticamente — el usuario deberá cambiarla en su próximo acceso.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario a editar.
          schema:
            type: integer
            example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Al menos uno de los campos es obligatorio.
              properties:
                name:
                  type: string
                  example: Nuevo Nombre
                email:
                  type: string
                  format: email
                  example: nuevo@email.com
                password:
                  type: string
                role:
                  type: string
                  enum: [USER, ADMINISTRATOR]
                group_id:
                  type: integer
                  nullable: true
                  example: 2
                is_active:
                  type: boolean
                  example: false
      responses:
        "200":
          description: Usuario actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserResponse"
        "400":
          description: ID inválido, body vacío o sin campos reconocidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: INVALID_USER_ID
                  message: ID de usuario no válido
        "401":
          description: Token ausente o inválido. Lanzado por el middleware antes de llegar al controller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "403":
          description: Token válido pero el usuario no tiene rol ADMINISTRATOR.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FORBIDDEN
                  message: No autorizado
        "404":
          description: |
            Uno de estos casos:
            - Usuario no encontrado, pertenece a otra empresa, o tiene rol `ADMINISTRATOR` (`USER_NOT_FOUND`).
            - El `group_id` indicado no existe o no pertenece a la empresa del administrador (`GROUP_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: USER_NOT_FOUND
                  message: Usuario no encontrado
        "409":
          description: El email ya está registrado por otro usuario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: EMAIL_ALREADY_EXISTS
                  message: Ya existe un usuario con ese email.
        "500":
          description: |
            Error interno inesperado. Posibles causas reales:
            - `UPDATE_FAILED` — el update en BD devolvió un resultado inesperado.
            - `USER_NOT_FOUND` — el usuario se actualizó correctamente pero no pudo recuperarse justo después (caso extremadamente raro).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
              example:
                data: null
                error:
                  code: UPDATE_FAILED
                  message: Error al actualizar el usuario.

    delete:
      tags: ["Admin › Users"]
      summary: Eliminar usuario
      description: |
        Elimina un usuario de la empresa del administrador autenticado.

        **Reglas de negocio**
        - El usuario debe pertenecer a la misma empresa que el administrador autenticado.
        - Si el rol del solicitante es `ADMINISTRATOR`, solo puede eliminar usuarios de su propio departamento.
        - **No se puede eliminar a uno mismo** (`CANNOT_DELETE_SELF`).
        - **No se puede eliminar a un `SUPERADMIN`** desde este endpoint (`CANNOT_DELETE_SUPERADMIN`).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario a eliminar.
          schema:
            type: integer
            example: 7
      responses:
        "200":
          description: Usuario eliminado correctamente. Devuelve el ID del usuario eliminado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserResponse"
        "400":
          description: ID inválido o intento de eliminarse a uno mismo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: CANNOT_DELETE_SELF
                  message: No puedes eliminar tu propio usuario.
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: MISSING_AUTH_HEADER
                  message: No autorizado
        "403":
          description: El usuario es `SUPERADMIN` o un `ADMINISTRATOR` intenta eliminar a alguien de otro departamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: CANNOT_DELETE_SUPERADMIN
                  message: No se puede eliminar un usuario superadmin desde aquí.
        "404":
          description: Usuario no encontrado o pertenece a otra empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: USER_NOT_FOUND
                  message: Usuario no encontrado
        "500":
          description: |
            Error interno inesperado. Posibles causas reales:
            - `USER_DELETE_FAILED` — el delete en BD devolvió un resultado inesperado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
              example:
                data: null
                error:
                  code: USER_DELETE_FAILED
                  message: No se pudo eliminar el usuario.

