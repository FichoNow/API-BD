        - Si el fichaje tiene `clock_out`, `started_at` no puede ser posterior a él (comparación por minuto).
        - Si la entry ya tiene `ended_at`, `started_at` no puede ser posterior a él (comparación por minuto).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del fichaje.
          schema:
            type: integer
            example: 42
        - name: entryId
          in: path
          required: true
          description: ID de la entry a actualizar.
          schema:
            type: integer
            example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [started_at]
              properties:
                started_at:
                  type: string
                  format: date-time
                  description: Nueva hora de inicio en formato ISO 8601 UTC.
                  example: "2026-03-29T09:00:00.000Z"
      responses:
        "200":
          description: Hora de inicio actualizada correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NullResponse"
        "400":
          description: |
            Alguno de estos casos:
            - Body inválido o campos faltantes (`BAD_REQUEST`).
            - `started_at` anterior al `clock_in` del fichaje (`ENTRY_STARTED_AT_BEFORE_CLOCK_IN`).
            - `started_at` posterior al `clock_out` del fichaje (`ENTRY_STARTED_AT_AFTER_CLOCK_OUT`).
