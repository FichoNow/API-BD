            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Departamento no encontrado o pertenece a otra empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: DEPARTMENT_NOT_FOUND
                  message: Departamento no encontrado.
        "409":
          description: Ya existe un grupo con ese nombre en el departamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: GROUP_ALREADY_EXISTS
                  message: Ya existe un grupo con ese nombre.

  /admin/group/{id}:
    patch:
      tags: ["Admin › Groups"]
      summary: Editar nombre de grupo
      description: |
        Actualiza el nombre de un grupo existente.

        **Reglas de negocio**
        - El grupo debe pertenecer a un departamento de la empresa del administrador.
        - Si el rol es `ADMINISTRATOR`, solo puede editar grupos de su propio departamento.
        - Al menos un campo debe estar presente en el body.
        - El nuevo nombre no puede coincidir con el de otro grupo del mismo departamento.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del grupo a editar.
          schema:
            type: integer
            example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Al menos uno de los campos es obligatorio.
              properties:
                name:
                  type: string
                  minLength: 1
                  example: Equipo Backend Senior
      responses:
        "200":
          description: Grupo actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          description: ID inválido o body sin campos válidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: INVALID_GROUP_ID
                  message: ID de grupo no válido
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sin permisos para editar este grupo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grupo no encontrado o pertenece a otra empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: GROUP_NOT_FOUND
                  message: Grupo no encontrado.
        "409":
          description: Ya existe otro grupo con ese nombre en el departamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: GROUP_ALREADY_EXISTS
                  message: Ya existe un grupo con ese nombre.

    delete:
      tags: ["Admin › Groups"]
      summary: Eliminar grupo
      description: |
        Elimina un grupo de trabajo.

        **Reglas de negocio**
        - El grupo debe pertenecer a un departamento de la empresa del administrador.
        - Si el rol es `ADMINISTRATOR`, solo puede eliminar grupos de su propio departamento.
        - **No se puede eliminar un grupo que tenga empleados asignados** — primero hay que reasignarlos.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del grupo a eliminar.
          schema:
            type: integer
            example: 3
      responses:
        "200":
          description: Grupo eliminado correctamente. Devuelve el ID del grupo eliminado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGroupResponse"
        "400":
          description: ID inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: INVALID_GROUP_ID
                  message: ID de grupo no válido
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sin permisos para eliminar este grupo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grupo no encontrado o pertenece a otra empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: GROUP_NOT_FOUND
                  message: Grupo no encontrado.
        "409":
          description: El grupo tiene empleados asignados y no puede eliminarse.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: GROUP_HAS_USERS
                  message: "No se puede eliminar: el grupo tiene 4 empleado(s) asignado(s)."
        "500":
          description: Error interno al eliminar.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
              example:
                data: null
                error:
                  code: GROUP_DELETE_FAILED
                  message: No se pudo eliminar el grupo.

  # ─────────────────────────────────────────
  # ADMIN › REQUESTS
  # ─────────────────────────────────────────

  /admin/requests:
    get:
      tags: ["Admin › Requests"]
      summary: Listar solicitudes de ausencia (panel admin)
      description: |
        Devuelve todas las solicitudes de ausencia de los empleados de un departamento concreto.
        Incluye datos del empleado y de la revisión (revisor, fecha, comentario).

        **Reglas de negocio**
        - El `departmentId` es obligatorio (query param).
        - El departamento debe pertenecer a la empresa del administrador.
        - Si el rol es `ADMINISTRATOR`, solo puede consultar las solicitudes de su propio departamento.
      security:
        - bearerAuth: []
      parameters:
        - name: departmentId
          in: query
          required: true
          description: ID del departamento del que se quieren listar las solicitudes.
          schema:
            type: integer
            example: 2
      responses:
        "200":
          description: Lista de solicitudes del departamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdminRequestsResponse"
        "400":
          description: Query param `departmentId` ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: BAD_REQUEST
                  message: El parámetro departmentId es requerido y debe ser un número válido
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sin permisos para consultar este departamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Departamento no encontrado o pertenece a otra empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/requests/{id}/approve:
    patch:
      tags: ["Admin › Requests"]
      summary: Aprobar solicitud de ausencia
      description: |
        Aprueba una solicitud de ausencia de un empleado.

        **Reglas de negocio**
        - La solicitud debe pertenecer a un usuario de la empresa del administrador.
        - Si el rol es `ADMINISTRATOR`, solo puede aprobar solicitudes de su propio departamento.
        - Solo se pueden aprobar solicitudes en estado `PENDING`.
        - El campo `reviewed_by` queda registrado automáticamente con el ID del admin autenticado.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la solicitud a aprobar.
          schema:
            type: integer
            example: 12
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Body opcional. Solo permite enviar un comentario de revisión.
              properties:
                review_comment:
                  type: string
                  maxLength: 255
                  nullable: true
                  example: "Aprobado sin condiciones"
      responses:
        "200":
          description: Solicitud aprobada correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewRequestResponse"
        "400":
          description: ID inválido, body inválido o solicitud no está en estado PENDING.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: INVALID_REQUEST_ID
                  message: ID de solicitud no válido
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sin permisos para aprobar esta solicitud.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Solicitud no encontrada o pertenece a otra empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: REQUEST_NOT_FOUND
                  message: Solicitud no encontrada.

  /admin/requests/{id}/reject:
    patch:
      tags: ["Admin › Requests"]
      summary: Rechazar solicitud de ausencia
      description: |
        Rechaza una solicitud de ausencia de un empleado.

        **Reglas de negocio**
        - La solicitud debe pertenecer a un usuario de la empresa del administrador.
        - Si el rol es `ADMINISTRATOR`, solo puede rechazar solicitudes de su propio departamento.
        - Solo se pueden rechazar solicitudes en estado `PENDING`.
        - El campo `reviewed_by` queda registrado automáticamente con el ID del admin autenticado.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la solicitud a rechazar.
          schema:
            type: integer
            example: 12
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Body opcional. Solo permite enviar un comentario de revisión.
              properties:
                review_comment:
                  type: string
                  maxLength: 255
                  nullable: true
                  example: "Rechazado por solapamiento con otra solicitud"
      responses:
        "200":
          description: Solicitud rechazada correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewRequestResponse"
        "400":
          description: ID inválido, body inválido o solicitud no está en estado PENDING.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: INVALID_REQUEST_ID
                  message: ID de solicitud no válido
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sin permisos para rechazar esta solicitud.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Solicitud no encontrada o pertenece a otra empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: REQUEST_NOT_FOUND
                  message: Solicitud no encontrada.

  # ─────────────────────────────────────────
  # ADMIN › STATS
  # ─────────────────────────────────────────

  /admin/stats/overview:
    get:
      tags: ["Admin › Stats"]
      summary: Resumen general del departamento
      description: |
        Devuelve métricas globales del departamento para el periodo indicado:
        minutos totales, horas extra, puntualidad, ausencias activas, solicitudes pendientes,
        empleados activos y desglose diario.
        Incluye además los valores del periodo anterior para comparativa.

        **Reglas de negocio**
        - Si se omiten `month` y `year`, se devuelve la **semana actual**.
        - Si solo se proporciona `month`, se asume el año actual.
      security:
        - bearerAuth: []
      parameters:
        - name: departmentId
          in: query
          required: true
          description: ID del departamento a consultar.
          schema:
            type: integer
            example: 2
        - name: month
          in: query
          description: Mes (1-12). Omitir para semana actual.
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
        - name: year
          in: query
          description: Año a consultar.
          schema:
            type: integer
            example: 2026
        - name: groupId
          in: query
          description: Filtrar por un grupo concreto del departamento.
          schema:
            type: integer
            example: 3
      responses:
        "200":
          description: Resumen del departamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverviewResponse"
        "400":
          description: Query params inválidos o `departmentId` ausente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token ausente o inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Sin permisos para consultar este departamento.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats/ranking:
    get:
      tags: ["Admin › Stats"]
      summary: Ranking de empleados por horas
      description: |
        Devuelve el ranking de empleados del departamento ordenado por minutos totales (regulares + extra),
        incluyendo su tasa de puntualidad.
      security:
        - bearerAuth: []
      parameters:
        - name: departmentId
          in: query
          required: true
          schema:
            type: integer
            example: 2
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
        - name: year
          in: query
          schema:
            type: integer
            example: 2026
        - name: groupId
          in: query
          schema:
            type: integer
            example: 3
      responses:
        "200":
          description: Ranking de empleados.
          content:
            application/json:
