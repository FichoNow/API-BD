        "403":
          description: Token válido pero el usuario no tiene rol ADMINISTRATOR.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                data: null
                error:
                  code: FORBIDDEN
                  message: No autorizado
        "404":
          description: Proyecto no encontrado o pertenece a otra empresa. También se devuelve si el group_id no existe o no es de la empresa.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
